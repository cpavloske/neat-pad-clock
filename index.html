<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neat Pad Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Neat template palette */
    --bg: #f3ede6;
    --surface: #ffffff;
    --border: #dcd3ce;
    --text-primary: #2c2520;
    --text-secondary: #877670;
    --text-muted: #b5aaa4;
    --accent: #6e9a84;
    --accent-hover: #4a7265;
    --accent-light: #e4eeea;
    --shadow: 0 1px 3px rgba(44,37,32,0.05), 0 4px 20px rgba(44,37,32,0.06);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 32px 28px;
    gap: 0;
  }

  /* Location picker */
  .location-bar {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .location-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .location-btn:hover { color: var(--text-primary); border-color: var(--accent); }
  .location-btn svg { opacity: 0.6; }

  .location-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .location-modal.open { display: flex; }

  .location-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 380px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .location-card h3 {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text-primary);
  }

  .presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .preset-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
  }
  .preset-btn:hover, .preset-btn.active {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .custom-row {
    display: flex;
    gap: 8px;
  }

  .custom-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.18s;
  }
  .custom-input:focus { border-color: var(--accent); }
  .custom-input::placeholder { color: var(--text-muted); }

  .apply-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s;
    white-space: nowrap;
  }
  .apply-btn:hover { background: var(--accent-hover); }

  /* Main layout - 1280x800 Neat Pad */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    align-items: center;
    justify-items: center;
    gap: 20px 40px;
    width: 100%;
    max-width: 1100px;
    padding: 0 20px;
  }

  /* Clock */
  .clock-block {
    text-align: center;
    grid-column: 1;
    grid-row: 1;
  }

  .time {
    font-family: 'Inter', sans-serif;
    font-size: 112px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text-primary);
    font-weight: 300;
  }

  .time-sub {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .time-sub .dot {
    width: 3px;
    height: 3px;
    background: var(--text-muted);
    border-radius: 50%;
  }

  /* Date */
  .date-block {
    text-align: center;
    grid-column: 1;
    grid-row: 2;
    margin-top: -4px;
  }

  .date-day {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .date-full {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  /* Weather card - right column spans both rows */
  .weather-card {
    grid-column: 2;
    grid-row: 1 / span 2;
    justify-self: stretch;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04), 0 12px 36px rgba(0,0,0,0.06);
    align-self: stretch;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .weather-hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 32px 22px;
    position: relative;
    overflow: hidden;
    flex: 1;
  }

  .weather-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-light) 0%, transparent 50%);
    pointer-events: none;
  }

  .weather-hero-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 1;
  }

  .weather-hero-temp {
    font-family: 'Inter', sans-serif;
    font-size: 64px;
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: -0.03em;
    font-weight: 300;
  }

  .weather-hero-desc {
    font-size: 16px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .weather-hero-range {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .weather-hero-range span {
    color: var(--text-secondary);
    font-weight: 500;
  }

  .weather-hero-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    z-index: 1;
  }

  .weather-big-icon {
    font-size: 56px;
    line-height: 1;
    filter: drop-shadow(0 3px 12px rgba(0,0,0,0.08));
    animation: floatIcon 4s ease-in-out infinite;
  }

  @keyframes floatIcon {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
  }

  .weather-feels {
    font-size: 13px;
    color: var(--text-muted);
    text-align: right;
  }

  .weather-divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }

  .weather-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }

  .weather-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 18px 10px;
    position: relative;
    transition: background 0.18s;
    cursor: default;
  }

  .weather-stat:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 20%;
    height: 60%;
    width: 1px;
    background: var(--border);
  }

  .weather-stat:hover { background: var(--bg); }

  .weather-stat-icon {
    font-size: 18px;
    line-height: 1;
    opacity: 0.85;
  }

  .weather-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .weather-stat-value {
    font-size: 24px;
    font-weight: 300;
    color: var(--text-primary);
    line-height: 1;
    font-family: 'Inter', sans-serif;
  }

  .weather-stat-sub {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Location tag - hidden */
  .location-tag { display: none; }

  /* Skeleton shimmer */
  .weather-skeleton {
    width: 100%;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .skel {
    background: linear-gradient(90deg, var(--border) 25%, #f0ece6 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 10px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .weather-error {
    color: var(--text-muted);
    font-size: 13px;
    padding: 28px 20px;
    text-align: center;
  }

  /* Rain chart overlay */
  .rain-chart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .rain-chart-overlay.open { display: flex; }

  .rain-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px 20px;
    width: 420px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    animation: fadeUp 0.25s ease;
  }

  .rain-chart h3 {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 20px;
  }

  .rain-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 120px;
    padding-bottom: 24px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }

  .rain-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
    position: relative;
  }

  .rain-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    background: var(--accent);
    opacity: 0.45;
    min-height: 2px;
    transition: opacity 0.15s;
  }

  .rain-bar.current {
    opacity: 1;
  }

  .rain-bar-label {
    position: absolute;
    bottom: -20px;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .rain-bar-pct {
    font-size: 8px;
    color: var(--text-secondary);
    margin-bottom: 3px;
    opacity: 0;
  }

  .rain-bar.current + .rain-bar-pct,
  .rain-bar-col:hover .rain-bar-pct {
    opacity: 1;
  }

  .weather-stat.clickable {
    cursor: pointer;
  }
  .weather-stat.clickable:hover {
    background: var(--accent-light);
  }

  /* Neat logo */
  .neat-logo {
    position: fixed;
    bottom: 20px;
    left: 24px;
    opacity: 0.3;
    z-index: 5;
  }
  .neat-logo svg {
    width: 72px;
    height: auto;
  }

</style>
</head>
<body>

</div>

<!-- Rain chart overlay -->
<div class="rain-chart-overlay" id="rain-chart-overlay" onclick="closeRainChartOutside(event)">
  <div class="rain-chart" id="rain-chart-content"></div>
</div>

<!-- Location button -->
<div class="location-bar">
  <button class="location-btn" onclick="openModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
    <span id="location-label">Fort Worth, TX</span>
  </button>
</div>

<!-- Location modal -->
<div class="location-modal" id="location-modal" onclick="closeModalOutside(event)">
  <div class="location-card">
    <h3>Choose location</h3>
    <div class="presets">
      <button class="preset-btn" onclick="selectPreset('Fort Worth, TX', 32.7555, -97.3308, 'America/Chicago')">Fort Worth, TX</button>
      <button class="preset-btn" onclick="selectPreset('New York, NY', 40.7128, -74.0060, 'America/New_York')">New York, NY</button>
      <button class="preset-btn" onclick="selectPreset('London, UK', 51.5074, -0.1278, 'Europe/London')">London, UK</button>
      <button class="preset-btn" onclick="selectPreset('Tokyo, Japan', 35.6762, 139.6503, 'Asia/Tokyo')">Tokyo, Japan</button>
      <button class="preset-btn" onclick="selectPreset('Sydney, Australia', -33.8688, 151.2093, 'Australia/Sydney')">Sydney, Australia</button>
      <button class="preset-btn" onclick="selectPreset('Dubai, UAE', 25.2048, 55.2708, 'Asia/Dubai')">Dubai, UAE</button>

    </div>
    <div class="divider">or enter custom</div>
    <div class="custom-row">
      <input class="custom-input" id="custom-city" placeholder="City name (e.g. Denver, CO)" />
      <button class="apply-btn" onclick="applyCustom()">Search</button>
    </div>
    <div id="geo-error" style="color:#997a6c;font-size:12px;margin-top:10px;display:none;">Could not find that city. Try "City, ST" format.</div>
  </div>
</div>

<!-- Main content -->
<div class="main">

  <div class="clock-block">
    <div class="time" id="time">--:--</div>
    <div class="time-sub">
      <span id="ampm">--</span>
      <span class="dot"></span>
      <span id="seconds">--</span>
    </div>
  </div>

  <div class="date-block">
    <div class="date-day" id="date-day">--</div>
    <div class="date-full" id="date-full">--</div>
  </div>

  <div class="weather-card" id="weather-strip">
    <div class="weather-skeleton">
      <div class="skel" style="height:20px;width:40%"></div>
      <div class="skel" style="height:56px;width:55%"></div>
      <div class="skel" style="height:14px;width:30%"></div>
    </div>
  </div>

</div>



<script>
  // State
  let currentLat = 32.7555;
  let currentLon = -97.3308;
  let currentCity = 'Fort Worth, TX';
  let currentTimezone = 'America/Chicago';
  let weatherRefreshTimer = null;
  let currentHourlyPrecip = null;
  let currentHourIndex = -1;

  // Clock — uses currentTimezone to display the correct local time
  function updateClock() {
    const now = new Date();
    const opts = { timeZone: currentTimezone };

    let h = parseInt(now.toLocaleString('en-US', { ...opts, hour: 'numeric', hour12: false }));
    const m = parseInt(now.toLocaleString('en-US', { ...opts, minute: 'numeric' }));
    const s = parseInt(now.toLocaleString('en-US', { ...opts, second: 'numeric' }));
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('time').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    document.getElementById('ampm').textContent = ampm;
    document.getElementById('seconds').textContent = String(s).padStart(2,'0');

    const dayName = now.toLocaleString('en-US', { ...opts, weekday: 'long' });
    const month = now.toLocaleString('en-US', { ...opts, month: 'long' });
    const day = parseInt(now.toLocaleString('en-US', { ...opts, day: 'numeric' }));
    const year = parseInt(now.toLocaleString('en-US', { ...opts, year: 'numeric' }));
    const ord = (n) => n + (['th','st','nd','rd'][(n%100-20)%10]||['th','st','nd','rd'][n%100]||'th');
    document.getElementById('date-day').textContent = dayName;
    document.getElementById('date-full').textContent = `${month} ${ord(day)}, ${year}`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  // Weather icons
  function weatherIcon(code, isDay) {
    const d = isDay;
    if (code === 0) return d ? '☀️' : '🌙';
    if (code <= 2) return d ? '⛅' : '🌙';
    if (code === 3) return '☁️';
    if (code <= 48) return '🌫';
    if (code <= 57) return d ? '🌦' : '🌧';
    if (code <= 67) return '🌧';
    if (code <= 77) return '🌨';
    if (code <= 82) return '🌧';
    if (code <= 86) return '❄️';
    if (code <= 99) return '⛈';
    return '🌡';
  }

  function weatherDesc(code) {
    if (code === 0) return 'Clear';
    if (code === 1) return 'Mostly Clear';
    if (code === 2) return 'Partly Cloudy';
    if (code === 3) return 'Overcast';
    if (code <= 48) return 'Foggy';
    if (code <= 57) return 'Drizzle';
    if (code <= 67) return 'Rain';
    if (code <= 77) return 'Snow';
    if (code <= 82) return 'Showers';
    if (code <= 86) return 'Snow Showers';
    if (code <= 99) return 'Thunderstorm';
    return 'Unknown';
  }

  function windDir(deg) {
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg/45) % 8];
  }

  async function fetchWeather(lat, lon, showSkeleton) {
    const strip = document.getElementById('weather-strip');
    if (showSkeleton) {
      strip.innerHTML = `
        <div class="weather-skeleton">
          <div class="skel" style="height:20px;width:40%"></div>
          <div class="skel" style="height:56px;width:55%"></div>
          <div class="skel" style="height:14px;width:30%"></div>
        </div>`;
    }
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,is_day&hourly=precipitation_probability&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=1`;
      const res = await fetch(url);
      const data = await res.json();
      const c = data.current;
      const d = data.daily;
      const h = data.hourly;

      // Update timezone from API response
      if (data.timezone) {
        currentTimezone = data.timezone;
        updateClock();
      }

      const isDay = c.is_day;
      const icon = weatherIcon(c.weather_code, isDay);
      const desc = weatherDesc(c.weather_code);
      const temp = Math.round(c.temperature_2m);
      const feels = Math.round(c.apparent_temperature);
      const humidity = c.relative_humidity_2m;
      const wind = Math.round(c.wind_speed_10m);
      const windD = windDir(c.wind_direction_10m);
      const hi = Math.round(d.temperature_2m_max[0]);
      const lo = Math.round(d.temperature_2m_min[0]);

      // Get current hour's precipitation probability
      const currentTime = c.time; // e.g. "2026-03-05T17:00"
      const hourIdx = h.time.indexOf(currentTime.slice(0, 14) + '00');
      const precip = hourIdx >= 0 ? h.precipitation_probability[hourIdx] : 0;

      // Store hourly data for rain chart
      currentHourlyPrecip = { times: h.time, probs: h.precipitation_probability };
      currentHourIndex = hourIdx;

      strip.innerHTML = `
        <div class="weather-hero">
          <div class="weather-hero-left">
            <div class="weather-hero-temp">${temp}°F</div>
            <div class="weather-hero-desc">${desc}</div>
            <div class="weather-hero-range">
              <span>H ${hi}°</span> &nbsp;·&nbsp; <span>L ${lo}°</span>
            </div>
          </div>
          <div class="weather-hero-right">
            <div class="weather-big-icon">${icon}</div>
            <div class="weather-feels">Feels like ${feels}°</div>
          </div>
        </div>
        <div class="weather-divider"></div>
        <div class="weather-stats">
          <div class="weather-stat">
            <div class="weather-stat-icon">💧</div>
            <div class="weather-stat-label">Humidity</div>
            <div class="weather-stat-value">${humidity}%</div>
            <div class="weather-stat-sub">relative</div>
          </div>
          <div class="weather-stat clickable" onclick="showRainChart()">
            <div class="weather-stat-icon">🌧</div>
            <div class="weather-stat-label">Rain Chance</div>
            <div class="weather-stat-value">${precip}%</div>
            <div class="weather-stat-sub">now</div>
          </div>
          <div class="weather-stat">
            <div class="weather-stat-icon">💨</div>
            <div class="weather-stat-label">Wind</div>
            <div class="weather-stat-value">${wind}</div>
            <div class="weather-stat-sub">mph · ${windD}</div>
          </div>
        </div>
      `;
    } catch(e) {
      strip.innerHTML = '<div class="weather-error">Unable to load weather. Check connection.</div>';
    }
  }

  function scheduleWeatherRefresh() {
    if (weatherRefreshTimer) clearInterval(weatherRefreshTimer);
    weatherRefreshTimer = setInterval(() => fetchWeather(currentLat, currentLon, false), 30 * 1000);
  }

  // Location modal
  function openModal() {
    document.getElementById('location-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('location-modal').classList.remove('open');
    document.getElementById('geo-error').style.display = 'none';
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('location-modal')) closeModal();
  }

  function setLocation(city, lat, lon, tz) {
    currentCity = city;
    currentLat = lat;
    currentLon = lon;
    if (tz) {
      currentTimezone = tz;
      updateClock();
    }
    document.getElementById('location-label').textContent = city;
    fetchWeather(lat, lon, true);
    scheduleWeatherRefresh();
    closeModal();
  }

  function selectPreset(city, lat, lon, tz) {
    setLocation(city, lat, lon, tz);
  }

  async function applyCustom() {
    const input = document.getElementById('custom-city').value.trim();
    if (!input) return;
    const errEl = document.getElementById('geo-error');
    errEl.style.display = 'none';
    try {
      const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(input)}&count=5&language=en&format=json`;
      const res = await fetch(geoUrl);
      if (!res.ok) throw new Error('Network error');
      const data = await res.json();
      if (!data.results || data.results.length === 0) {
        errEl.style.display = 'block';
        return;
      }
      const r = data.results[0];
      const parts = [r.name];
      if (r.admin1) parts.push(r.admin1);
      if (r.country) parts.push(r.country);
      const label = parts.slice(0, 2).join(', ');
      setLocation(label, r.latitude, r.longitude, r.timezone);
      document.getElementById('custom-city').value = '';
    } catch(e) {
      errEl.style.display = 'block';
    }
  }

  document.getElementById('custom-city').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyCustom();
  });

  // Rain chart
  function showRainChart() {
    if (!currentHourlyPrecip) return;
    const { times, probs } = currentHourlyPrecip;
    const hourLabels = ['12a','1a','2a','3a','4a','5a','6a','7a','8a','9a','10a','11a','12p','1p','2p','3p','4p','5p','6p','7p','8p','9p','10p','11p'];
    let bars = '';
    for (let i = 0; i < 24 && i < probs.length; i++) {
      const pct = probs[i];
      const isCurrent = i === currentHourIndex;
      const showLabel = i % 3 === 0;
      bars += `<div class="rain-bar-col">
        <div class="rain-bar-pct">${pct}%</div>
        <div class="rain-bar${isCurrent ? ' current' : ''}" style="height:${Math.max(pct, 2)}%"></div>
        ${showLabel ? `<span class="rain-bar-label">${hourLabels[i]}</span>` : ''}
      </div>`;
    }
    document.getElementById('rain-chart-content').innerHTML = `<h3>Rain Chance Today</h3><div class="rain-bars">${bars}</div>`;
    document.getElementById('rain-chart-overlay').classList.add('open');
  }

  function closeRainChartOutside(e) {
    if (e.target === document.getElementById('rain-chart-overlay')) {
      document.getElementById('rain-chart-overlay').classList.remove('open');
    }
  }

  // Init
  fetchWeather(currentLat, currentLon, true);
  scheduleWeatherRefresh();
</script>
</body>
</html>
